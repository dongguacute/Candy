# 发布 Release 时可用于本地/后续流水线：版本同步脚本会写入 React Native 的 package.json。
# 打 Android 包：在 apps/candy-native 执行 `pnpm android`（需本机 Android SDK / 或 EAS）。
name: Release

on:
  release:
    types: [published]

jobs:
  sync-version:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
      - name: Sync version from tag into package.json files
        run: bash scripts/ci/sync-version-from-tag.sh "${{ github.event.release.tag_name }}"
