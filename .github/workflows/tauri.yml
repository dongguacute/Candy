# 桌面端：Tauri 打包。与 Vercel 无关（Vercel 仍只跑 Next `output: export`）。
name: Tauri desktop

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/candy/**"
      - ".github/workflows/tauri.yml"

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Linux dependencies (Tauri / WebKitGTK)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install JS dependencies (monorepo root)
        run: pnpm install --frozen-lockfile

      - name: Build Tauri (runs `pnpm build` in apps/candy → Next export → bundle)
        run: pnpm --filter candy exec tauri build

      - name: Upload Linux bundles
        uses: actions/upload-artifact@v4
        with:
          name: candy-linux-bundles
          path: |
            apps/candy/src-tauri/target/release/bundle/deb/*.deb
            apps/candy/src-tauri/target/release/bundle/appimage/*.AppImage
