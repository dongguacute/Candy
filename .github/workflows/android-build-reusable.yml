# 可复用：检出指定 tag → 按 tag 同步版本 → 构建 Android → 可选上传到 GitHub Release。
name: Android build (reusable)

on:
  workflow_call:
    inputs:
      checkout_ref:
        description: Git ref（一般为 release tag，如 v1.0.0）
        type: string
        required: true
      upload_to_release:
        description: 将 APK/AAB 上传到对应 tag 的 GitHub Release
        type: boolean
        default: true

env:
  ANDROID_API: "34"
  BUILD_TOOLS: "34.0.0"
  BUILD_TOOLS_VER: "34.0.0"
  NDK_VERSION: "26.1.10909125"

jobs:
  android:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Sync version from tag
        run: bash scripts/ci/sync-version-from-tag.sh "${{ inputs.checkout_ref }}"

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK (cmdline-tools, platform-tools)
        uses: android-actions/setup-android@v3

      - name: Install platform, build-tools, NDK, CMake
        run: |
          sdkmanager --install \
            "platforms;android-${{ env.ANDROID_API }}" \
            "build-tools;${{ env.BUILD_TOOLS }}" \
            "ndk;${{ env.NDK_VERSION }}" \
            "cmake;3.22.1"

      - name: Export ANDROID_HOME / NDK_HOME
        run: |
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}" >> "$GITHUB_ENV"

      - name: Linux packages (Rust Android link / clang)
        run: |
          sudo apt-get update
          sudo apt-get install -y clang pkg-config libssl-dev

      - name: Rust stable + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Sync Cargo.lock package version
        run: (cd apps/candy/src-tauri && cargo update -p app)

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/candy/src-tauri -> target

      - name: Install JS dependencies (monorepo root)
        run: pnpm install --frozen-lockfile

      - name: Init Android project (skip if gen/android exists)
        run: |
          if [ ! -f apps/candy/src-tauri/gen/android/settings.gradle ]; then
            pnpm --filter candy exec tauri android init --ci -v
          else
            echo "Skipping init: gen/android already present"
          fi

      - name: Patch Android manifest (SCHEDULE_EXACT_ALARM, OEM 精确闹钟)
        run: bash scripts/patch-android-manifest.sh

      - name: Regenerate app icons (src-tauri/icons, 含 android mipmap 源)
        working-directory: apps/candy
        run: pnpm exec tauri icon icon-manifest.json

      - name: Sync mipmap into gen/android (覆盖 init 时的默认图标)
        run: bash scripts/sync-android-mipmap.sh

      - name: Build Android release (APK + AAB, aarch64)
        run: pnpm --filter candy exec tauri android build --ci -t aarch64 --apk --aab

      # 未签名的 release APK 在部分机型上会报 packageInfo is null；仓库 Secrets 配置 ANDROID_KEYSTORE_* 后自动签名
      - name: Sign release APKs (optional)
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: bash scripts/ci/sign-android-apks.sh

      - name: Upload APK / AAB (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: candy-android-${{ inputs.checkout_ref }}
          path: |
            apps/candy/src-tauri/gen/android/app/build/outputs/**/*.apk
            apps/candy/src-tauri/gen/android/app/build/outputs/**/*.aab
          if-no-files-found: warn

      - name: Upload to GitHub Release
        if: ${{ inputs.upload_to_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.checkout_ref }}
          generate_release_notes: false
          files: |
            apps/candy/src-tauri/gen/android/app/build/outputs/**/*.apk
            apps/candy/src-tauri/gen/android/app/build/outputs/**/*.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
