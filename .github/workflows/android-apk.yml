name: Android APK

on:
  release:
    types: [published]

jobs:
  build-android-apk:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Ensure native app dependencies are linked
        run: pnpm --filter candy-native install --frozen-lockfile

      - name: Ensure expo-asset is present for Metro
        run: |
          pnpm --filter candy-native exec node -e "require.resolve('expo-asset/tools/hashAssetFiles')" \
            || pnpm --filter candy-native add expo-asset@~11.0.5

      - name: Ensure babel-preset-expo is present for Metro
        run: |
          pnpm --filter candy-native exec node -e "require.resolve('babel-preset-expo')" \
            || pnpm --filter candy-native add -D babel-preset-expo@~12.0.12

      - name: Verify Expo asset resolver dependency
        run: pnpm --filter candy-native exec node -e "require.resolve('expo-asset/tools/hashAssetFiles')"

      - name: Verify Babel preset dependency
        run: pnpm --filter candy-native exec node -e "require.resolve('babel-preset-expo')"

      - name: Sync version from tag
        run: bash scripts/ci/sync-version-from-tag.sh "${{ github.event.release.tag_name }}"

      - id: app_version
        name: Read app version
        run: echo "value=$(node -p 'require(\"./apps/candy-native/package.json\").version')" >> "$GITHUB_OUTPUT"

      - name: Generate Android project
        run: CI=1 pnpm --filter candy-native exec expo prebuild --platform android --no-install

      - name: Patch Gradle repository fallbacks
        run: |
          node -e "
            const fs = require('fs');
            const file = 'apps/candy-native/android/settings.gradle';
            let src = fs.readFileSync(file, 'utf8');
            if (!src.includes('maven.aliyun.com')) {
              src = src.replace(
                'pluginManagement {',
                [
                  'pluginManagement {',
                  '    repositories {',
                  '        gradlePluginPortal()',
                  '        google()',
                  '        maven { url \"https://maven.aliyun.com/repository/google\" }',
                  '        maven { url \"https://maven.aliyun.com/repository/public\" }',
                  '        mavenCentral()',
                  '    }'
                ].join('\n')
              );
              fs.writeFileSync(file, src);
              console.log('Patched Gradle plugin repositories with mirror fallbacks');
            }
          "

      - name: Write Android signing files
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ] || [ -z "$ANDROID_KEYSTORE_PASSWORD" ]; then
            echo "Missing ANDROID_KEYSTORE_BASE64 or ANDROID_KEYSTORE_PASSWORD"
            exit 1
          fi

          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "apps/candy-native/android/app/upload-keystore.jks"

          KEY_ALIAS="$(keytool -list -keystore "apps/candy-native/android/app/upload-keystore.jks" -storepass "$ANDROID_KEYSTORE_PASSWORD" | awk -F, '/,/{print $1; exit}')"
          if [ -z "$KEY_ALIAS" ]; then
            echo "Failed to detect key alias from keystore"
            exit 1
          fi

          {
            echo "MYAPP_UPLOAD_STORE_FILE=upload-keystore.jks"
            echo "MYAPP_UPLOAD_KEY_ALIAS=$KEY_ALIAS"
            echo "MYAPP_UPLOAD_STORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD"
            echo "MYAPP_UPLOAD_KEY_PASSWORD=$ANDROID_KEYSTORE_PASSWORD"
          } >> "apps/candy-native/android/gradle.properties"

      - name: Build release APK
        working-directory: apps/candy-native/android
        run: |
          ./gradlew :app:generateAutolinkingPackageList
          node -e "
            const fs = require('fs');
            const file = 'app/build/generated/autolinking/src/main/java/com/facebook/react/PackageList.java';
            if (!fs.existsSync(file)) {
              console.log('Autolinking PackageList.java not found, skip patch');
              process.exit(0);
            }
            const src = fs.readFileSync(file, 'utf8');
            const next = src
              .replace('import expo.core.ExpoModulesPackage;', 'import expo.modules.ExpoModulesPackage;')
              .replace('new expo.core.ExpoModulesPackage()', 'new expo.modules.ExpoModulesPackage()');
            if (src !== next) {
              fs.writeFileSync(file, next);
              console.log('Patched ExpoModulesPackage fallback in PackageList.java');
            }
          "
          ./gradlew assembleRelease -x :app:generateAutolinkingPackageList

      - name: Rename APK
        run: |
          cp \
            "apps/candy-native/android/app/build/outputs/apk/release/app-release.apk" \
            "apps/candy-native/android/app/build/outputs/apk/release/candy+${{ steps.app_version.outputs.value }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: candy+${{ steps.app_version.outputs.value }}.apk
          path: apps/candy-native/android/app/build/outputs/apk/release/candy+${{ steps.app_version.outputs.value }}.apk
